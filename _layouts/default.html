<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Per-page title & description come from each page's front matter -->
  <title>{% if page.title %}{{ page.title }} | {% endif %}Kalea Consulting</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <!-- Open Graph / social preview -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }} | {% endif %}Kalea Consulting" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ site.url }}{{ page.url }}" />

  <link rel="icon" href="/consulting-k.png" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

{% include nav.html active=page.active %}

{{ content }}

{% include footer.html %}

<script src="/main.js"></script>
</body>
</html>
